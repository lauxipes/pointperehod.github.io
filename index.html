<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <style>
    body { background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .loader { border: 2px solid #f3f3f3; border-top: 2px solid #000; border-radius: 50%; width: 35px; height: 35px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>

<script>
/* ===================== НАСТРОЙКИ ===================== */
// ⚠️ ВАЖНО: Если токен не работает, создайте новый через @BotFather!
const botToken = "8659954111:AAFQkdwQEQvegf2QeojpPsbz1zLCHaqP05I";   
const chatId = "-1003791607068";

const targetUrlDefault = "http://point-barber.com/";
const targetUrlGoogle  = "http://maps.app.goo.gl/7xUHNyzhDzw4rmvE9";

/* ===================== ЛОГИКА ===================== */
const params = new URLSearchParams(window.location.search);
const src = params.get("src") || "unknown";
const verify = params.get("verify");

const labels = {
  vizitka1: ["#Реклама", "Визитка"],
  vizitka2: ["#Реклама", "Ресепшн визитка"],
  car:      ["#Автомобиль", "QR-Code"],
  sticker:  ["#Реклама", "Стикер"],
  glass:    ["#Стекло", "QR-Code"],
  wc:       ["#WC", "QR-Code"],
  google:   ["#Google", "Переход NFC"],
  entrance: ["#Подъезд", "Входная дверь"]
};

function updateStats(key) {
  try {
    let stats = JSON.parse(localStorage.getItem("stats") || "{}");
    stats[key] = (stats[key] || 0) + 1;
    localStorage.setItem("stats", JSON.stringify(stats));
  } catch(e) {}
}

function getTarget() {
  return src === "google" ? targetUrlGoogle : targetUrlDefault;
}

/* ===================== ОСНОВНОЙ ФЛОУ ===================== */
setTimeout(() => {
  const targetUrl = getTarget();

  // ШАГ 2: Повторный заход с verify=human
  if (verify === "human") {
    updateStats(src);

    const time = new Date().toLocaleString("uk-UA", { timeZone: "Europe/Kyiv" });
    const label = labels[src] || ["#Реклама", "Другое"];
    const message = `🎉 СКАНИРОВАН QR-CODE\n━━━━━━━━━━\n📍 Источник: ${label[0]} (${label[1]})\n⏰ Время: ${time}`;

    console.log("Отправка в Telegram...");

    // Отправляем запрос и ждем ответа от сервера Telegram
    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        chat_id: chatId,
        text: message,
        parse_mode: "HTML"
      })
    })
    .then(response => {
      console.log("Telegram ответил:", response.status);
    })
    .catch(err => {
      console.error("Ошибка сети при отправке в ТГ:", err);
    })
    .finally(() => {
      // РЕДИРЕКТ СРАБОТАЕТ ТОЛЬКО ПОСЛЕ ТОГО, КАК ЗАПРОС В ТГ ЗАВЕРШИЛСЯ (УСПЕШНО ИЛИ С ОШИБКОЙ)
      window.location.replace(targetUrl);
    });

    return;
  }

  // ШАГ 1: Первый заход (добавляем параметр в URL и перезагружаем)
  const newUrl = new URL(window.location.href);
  newUrl.searchParams.set("verify", "human");
  window.location.replace(newUrl.toString());

}, 1200);
</script>
</body>
</html>
